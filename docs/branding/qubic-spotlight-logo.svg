<svg xmlns="http://www.w3.org/2000/svg" width="360" height="96" viewBox="0 0 360 96" fill="none">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4EE0FC" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4EE0FC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAFEFF"/>
      <stop offset="45%" stop-color="#23FFFF"/>
      <stop offset="100%" stop-color="#4EE0FC"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3550"/>
      <stop offset="100%" stop-color="#141b2b"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Spotlight icon -->
  <g>
    <!-- light beam -->
    <path d="M50 48 L128 18 L128 78 Z" fill="url(#beam)"/>
    <!-- lamp body (par light) -->
    <rect x="12" y="34" width="30" height="28" rx="8" fill="url(#body)" stroke="#36507a" stroke-width="1.5"/>
    <!-- lens -->
    <circle cx="46" cy="48" r="16" fill="url(#lens)"/>
    <circle cx="46" cy="48" r="7" fill="#0d1117" opacity="0.25"/>
    <!-- highlighted ad = sparkle where the light lands -->
    <g filter="url(#glow)" fill="#7e6fff">
      <path d="M112 30 l3 8 l8 3 l-8 3 l-3 8 l-3 -8 l-8 -3 l8 -3 Z"/>
    </g>
    <circle cx="124" cy="58" r="2.5" fill="#4EE0FC" opacity="0.8"/>
    <circle cx="118" cy="66" r="1.8" fill="#23FFFF" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="150" y="50" font-family="Roboto, 'Segoe UI', sans-serif" font-size="34"
        font-weight="700" letter-spacing="1.5" fill="#F2F5FA">QUBIC</text>
  <text x="151" y="76" font-family="Roboto, 'Segoe UI', sans-serif" font-size="23"
        font-weight="400" letter-spacing="6.5" fill="#4EE0FC">SPOTLIGHT</text>
</svg>
